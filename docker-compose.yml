# Sprint 0 local-dev infrastructure (review C1, C2).
#
# This file defines ONLY the three infra services. The app services
# (hr-backend, hr-ai, hr-frontend) run on the HOST in dev and connect over
# localhost to the host-exposed ports below. App containerization is out of
# scope for Sprint 0. All image tags are pinned (no floating `latest`).
#
# Usage (from the hr-backend repo root):
#   docker compose up -d

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: hr_postgres
    environment:
      POSTGRES_USER: ${DB_USERNAME:-hr}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-hr_secret}
      POSTGRES_DB: ${DB_DATABASE:-hr_platform}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-hr} -d ${DB_DATABASE:-hr_platform}"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2024-01-16T16-07-38Z
    container_name: hr_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${AWS_ACCESS_KEY_ID:-minioadmin}
      MINIO_ROOT_PASSWORD: ${AWS_SECRET_ACCESS_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  # One-shot: create the bucket so a clean checkout is reproducible.
  minio-init:
    image: minio/mc:RELEASE.2024-01-13T08-44-48Z
    container_name: hr_minio_init
    depends_on:
      minio:
        condition: service_started
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 ${AWS_ACCESS_KEY_ID:-minioadmin} ${AWS_SECRET_ACCESS_KEY:-minioadmin}; do sleep 1; done;
      mc mb --ignore-existing local/${AWS_BUCKET:-hr-documents};
      exit 0;
      "

  mailhog:
    image: mailhog/mailhog:v1.0.1
    container_name: hr_mailhog
    ports:
      - "1025:1025"  # SMTP
      - "8025:8025"  # web UI -> http://localhost:8025
    logging:
      driver: none

volumes:
  pgdata:
  miniodata:
